availableSecrets:
  secretManager:
    - versionName: projects/181996111780/secrets/VITE_EMAIL_API_KEY/versions/latest
      env: 'VITE_EMAIL_API_KEY'
    - versionName: projects/181996111780/secrets/VITE_EMAIL_API_URL/versions/latest
      env: 'VITE_EMAIL_API_URL'

steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Build with secrets injected as env vars
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    secretEnv:
      - 'VITE_EMAIL_API_KEY'
      - 'VITE_EMAIL_API_URL'

  # Step 3: Deploy dist/ to GCS bucket
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-d'
      - './dist'
      - 'gs://virinchi-website'

options:
  logging: CLOUD_LOGGING_ONLY
